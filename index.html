<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>良辰备忘 - 云端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --jiang-red: #7f1d1d; 
            --jiang-red-light: #991b1b;
            --jiang-red-dark: #450a0a;
            --gold-leaf: #CFA06F; 
            --paper-yellow: #F2E9D8; 
            --text-main: #1A1A1A;
        }

        body { 
            background: radial-gradient(circle at center, #FBF7ED 0%, var(--paper-yellow) 100%);
            color: var(--text-main);
            font-family: 'Noto Serif SC', serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        .edit-mode .view-only, .view-mode .edit-only { display: none !important; }

        .tabs-container {
            display: flex; align-items: center; white-space: nowrap; overflow-x: auto;
            scrollbar-width: none; border-bottom: 2px solid rgba(127, 29, 29, 0.15);
            margin-bottom: 2.5rem;
        }
        .tab-btn { 
            padding: 0 1.5rem 1.2rem; cursor: pointer; color: #6b7280; font-size: 1.1rem;
            position: relative; flex-shrink: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-btn.active { color: var(--jiang-red); font-weight: 900; transform: translateY(-2px); }
        .tab-btn::after {
            content: ''; position: absolute; bottom: -2px; left: 50%; width: 0; height: 4px;
            background: var(--jiang-red); transition: all 0.4s ease; transform: translateX(-50%);
            border-radius: 99px;
        }
        .tab-btn.active::after { width: 70%; }

        .glass-card { 
            background: #ffffff; 
            border-radius: 24px; 
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 20px 20px 40px rgba(139, 126, 102, 0.25), -10px -10px 30px #ffffff;
            position: relative; overflow: hidden;
            animation: cardAppear 0.5s ease-out;
        }
        @keyframes cardAppear { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .red-header {
            background: linear-gradient(135deg, var(--jiang-red-light) 0%, var(--jiang-red) 50%, var(--jiang-red-dark) 100%);
            color: #ffffff;
            padding: 3.5rem 2rem 2.2rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }

        .deco-dot {
            width: 8px; height: 8px; background: var(--gold-leaf);
            transform: rotate(45deg); display: inline-block; margin: 0 12px;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        .btn-main { 
            background: linear-gradient(180deg, var(--jiang-red-light) 0%, var(--jiang-red) 100%);
            color: white; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--jiang-red-dark);
            box-shadow: 0 4px 0px var(--jiang-red-dark), 0 8px 15px rgba(0,0,0,0.3);
        }
        .btn-main:active { transform: translateY(3px) scale(0.96); box-shadow: 0 1px 0px var(--jiang-red-dark); }
        .btn-main:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="view-mode">

    <header class="max-w-6xl mx-auto pt-16 px-8 flex justify-between items-center relative z-20">
        <div class="flex flex-col">
            <div class="flex items-center gap-5">
                <h1 id="mainTitleDisplay" class="view-only text-3xl font-black tracking-widest text-gray-900">正在同步云端...</h1>
                <input id="mainTitleInput" type="text" class="edit-only text-3xl font-black tracking-widest text-red-900 bg-transparent border-b-2 border-red-400 outline-none" value="">
            </div>
            <div class="flex items-center text-[11px] text-red-800 font-bold tracking-[0.4em] uppercase opacity-80 mt-2">
                吉祥如意 <span class="mx-3 opacity-30">|</span> 婚礼管家
            </div>
        </div>
        <div class="flex items-center gap-5">
            <button id="editBtn" onclick="enterEditMode()" class="view-only text-sm font-bold text-gray-500 hover:text-red-900 transition-all hover:scale-105">编辑内容</button>
            <button onclick="cancelEdit()" class="edit-only text-xs font-bold text-gray-400 hover:text-gray-600 transition">撤销修改</button>
            <button id="saveBtn" onclick="saveEdit()" class="edit-only btn-main px-10 py-3 rounded-full text-xs font-bold">保存到云端</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto mt-16 px-8 pb-32 relative z-10">
        <div class="tabs-container mb-14" id="tabs-bar"></div>
        <div class="edit-only mb-12 flex items-center gap-4">
            <button onclick="addColumn('flow')" class="btn-main px-7 py-3 rounded-xl text-xs font-bold flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> 新增流程栏目
            </button>
            <button onclick="addColumn('list')" class="bg-white text-gray-800 px-7 py-3 rounded-xl text-xs font-bold border-2 border-gray-200 shadow-sm hover:border-red-200 transition-all flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> 新增清单栏目
            </button>
        </div>
        <div id="columns-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start transition-all duration-500"></div>
    </main>

    <script>
        // ================= CONFIGURATION =================
        const BIN_ID = '69bbe3b1c3097a1dd53c8322'; 
        const MASTER_KEY = '$2a$10$nWvpzMIaBRCgAxmTXOiEhuye51pLaSf3.vFS9NUptbUb0b.hGbW0u'; 
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        // =================================================

        let appData = {
            webTitle: "良辰备忘",
            tabs: [{ name: "加载中", columns: [] }]
        };

        let currentTabIndex = 0;
        let backupData = "";

        window.onload = () => { loadFromCloud(); };

        // 从云端加载
        async function loadFromCloud() {
            try {
                const res = await fetch(`${API_URL}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const result = await res.json();
                if (result.record) {
                    appData = result.record;
                    renderAll();
                }
            } catch (e) {
                console.error("云端加载失败:", e);
                alert("无法连接云端，请检查 BIN_ID 和 KEY 是否配置正确。");
            }
        }

        function renderAll() {
            document.getElementById('mainTitleDisplay').innerText = appData.webTitle;
            document.getElementById('mainTitleInput').value = appData.webTitle;
            renderTabs();
            renderColumns();
            lucide.createIcons();
        }

        function renderTabs() {
            const bar = document.getElementById('tabs-bar');
            bar.innerHTML = '';
            appData.tabs.forEach((tab, index) => {
                const active = index === currentTabIndex;
                const div = document.createElement('div');
                div.className = `tab-btn ${active ? 'active' : ''}`;
                div.innerHTML = `
                    <span onclick="switchTab(${index})">${tab.name}</span>
                    <button class="edit-only ml-3 text-gray-300 hover:text-red-600" onclick="deleteTab(${index})"><i data-lucide="x" class="w-4 h-4"></i></button>
                `;
                bar.appendChild(div);
            });
            const addBtn = document.createElement('button');
            addBtn.className = "edit-only px-6 pb-4 text-gray-300 hover:text-red-800 transition";
            addBtn.innerHTML = `<i data-lucide="plus" class="w-6 h-6"></i>`;
            addBtn.onclick = () => { appData.tabs.push({name: '新阶段', columns: []}); switchTab(appData.tabs.length - 1); };
            bar.appendChild(addBtn);
        }

        function switchTab(index) {
            currentTabIndex = index;
            renderAll();
        }

        function renderColumns() {
            const grid = document.getElementById('columns-grid');
            grid.innerHTML = '';
            const currentTab = appData.tabs[currentTabIndex];
            if(!currentTab) return;

            currentTab.columns.forEach((col, cIdx) => {
                const card = document.createElement('div');
                card.className = "glass-card flex flex-col";
                card.innerHTML = `
                    <div class="red-header">
                        <div class="w-full flex justify-between items-center">
                            <div class="flex-1 flex justify-center items-center">
                                <input type="text" class="edit-only text-lg font-bold border-b border-rose-300 w-full focus:border-white outline-none text-center bg-transparent text-white" value="${col.title}" onchange="appData.tabs[currentTabIndex].columns[${cIdx}].title=this.value">
                                <h3 class="view-only text-xl font-bold flex items-center justify-center tracking-widest text-white">
                                    <span class="deco-dot"></span>${col.title}<span class="deco-dot"></span>
                                </h3>
                            </div>
                            <button onclick="deleteColumn(${cIdx})" class="edit-only absolute right-6 text-rose-300 hover:text-white transition">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex-1 p-12 pb-8" id="col-content-${cIdx}"></div>
                    <button onclick="addRow(${cIdx})" class="edit-only mx-12 mb-10 py-3 border-2 border-dashed border-gray-200 rounded-xl text-xs font-bold text-gray-500 hover:bg-gray-50 transition-all">
                        + 添加新条目
                    </button>
                `;
                grid.appendChild(card);
                renderItems(cIdx);
            });
        }

        function renderItems(cIdx) {
            const col = appData.tabs[currentTabIndex].columns[cIdx];
            const container = document.getElementById(`col-content-${cIdx}`);
            if(col.type === 'flow') {
                container.innerHTML = `<div class="space-y-8" id="items-${cIdx}"></div>`;
                const list = document.getElementById(`items-${cIdx}`);
                col.items.forEach((it, iIdx) => {
                    const row = document.createElement('div');
                    row.className = "flex items-center gap-6 group"; 
                    row.innerHTML = `
                        <div class="flex items-center gap-3 view-only shrink-0">
                            <span class="font-black text-red-900 text-sm tracking-tight">${it.time}</span>
                            <i data-lucide="clock" class="w-4 h-4 text-gray-400"></i>
                        </div>
                        <p class="view-only text-gray-900 font-semibold text-sm leading-relaxed flex-1">${it.desc}</p>
                        <input type="time" class="edit-only text-xs border-none bg-gray-100 rounded p-1" value="${it.time}" onchange="updateVal(${cIdx}, ${iIdx}, 'time', this.value)">
                        <textarea class="edit-only flex-1 text-sm border-b border-transparent focus:border-red-200 resize-none outline-none py-1 bg-transparent font-semibold" onchange="updateVal(${cIdx}, ${iIdx}, 'desc', this.value)" rows="1">${it.desc}</textarea>
                        <button class="edit-only text-gray-300 hover:text-red-600" onclick="deleteItem(${cIdx}, ${iIdx})"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                    `;
                    list.appendChild(row);
                });
            } else {
                container.innerHTML = `
                    <table class="w-full">
                        <tbody id="items-${cIdx}"></tbody>
                        <tfoot><tr><td class="pt-10 text-[11px] font-black text-gray-500 uppercase tracking-widest">总计费用</td><td class="pt-10 text-right text-red-800 text-2xl font-black" id="total-${cIdx}">¥0</td><td></td></tr></tfoot>
                    </table>`;
                const list = document.getElementById(`items-${cIdx}`);
                col.items.forEach((it, iIdx) => {
                    const tr = document.createElement('tr');
                    tr.className = "group border-b border-gray-100 last:border-0";
                    tr.innerHTML = `
                        <td class="py-5 pl-2">
                            <span class="view-only text-sm text-gray-900 font-bold">${it.name}</span>
                            <input type="text" class="edit-only w-full border-none p-0 focus:ring-0 text-sm bg-transparent font-bold" value="${it.name}" onchange="updateVal(${cIdx}, ${iIdx}, 'name', this.value)">
                        </td>
                        <td class="py-5 text-right pr-2">
                            <span class="font-black text-red-900 text-base view-only">¥${it.price.toLocaleString()}</span>
                            <input type="number" class="edit-only w-24 text-right font-black text-base border-none p-0 focus:ring-0 text-red-900 bg-transparent" value="${it.price}" oninput="updateVal(${cIdx}, ${iIdx}, 'price', this.value); calcTotal(${cIdx})">
                        </td>
                        <td class="edit-only pl-2"><button class="text-gray-300 hover:text-red-600" onclick="deleteItem(${cIdx}, ${iIdx})"><i data-lucide="minus-circle" class="w-4 h-4"></i></button></td>
                    `;
                    list.appendChild(tr);
                });
                calcTotal(cIdx);
            }
            lucide.createIcons();
        }

        async function saveEdit() { 
            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = "正在同步到云端...";
            saveBtn.disabled = true;

            appData.webTitle = document.getElementById('mainTitleInput').value;
            
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(appData)
                });

                if (res.ok) {
                    document.body.classList.add('view-mode');
                    document.body.classList.remove('edit-mode');
                    renderAll();
                    alert("同步成功！");
                } else {
                    throw new Error("API 响应错误");
                }
            } catch (e) {
                alert("云端保存失败，请检查网络或 KEY。");
            } finally {
                saveBtn.innerText = originalText;
                saveBtn.disabled = false;
            }
        }

        function updateVal(cIdx, iIdx, key, val) { appData.tabs[currentTabIndex].columns[cIdx].items[iIdx][key] = (key === 'price') ? Number(val) : val; }
        function addRow(cIdx) { const col = appData.tabs[currentTabIndex].columns[cIdx]; col.items.push(col.type === 'flow' ? {time: '12:00', desc: '新事项'} : {name: '新项目', price: 0}); renderItems(cIdx); }
        function addColumn(type) { appData.tabs[currentTabIndex].columns.push({ type, title: type === 'flow' ? '流程日程' : '费用清单', items: [] }); renderColumns(); lucide.createIcons(); }
        function calcTotal(cIdx) { const t = appData.tabs[currentTabIndex].columns[cIdx].items.reduce((s, i) => s + (i.price || 0), 0); document.getElementById(`total-${cIdx}`).innerText = `¥${t.toLocaleString()}`; }
        function deleteTab(i) { if(confirm("确认删除？")) { appData.tabs.splice(i, 1); currentTabIndex = 0; renderAll(); } }
        function deleteColumn(i) { if(confirm("确认删除？")) { appData.tabs[currentTabIndex].columns.splice(i, 1); renderColumns(); lucide.createIcons(); } }
        function deleteItem(c, i) { appData.tabs[currentTabIndex].columns[c].items.splice(i, 1); renderItems(c); }
        function enterEditMode() { backupData = JSON.stringify(appData); document.body.classList.add('edit-mode'); document.body.classList.remove('view-mode'); renderAll(); }
        function cancelEdit() { if(confirm("撤销修改？")) { appData = JSON.parse(backupData); document.body.classList.add('view-mode'); document.body.classList.remove('edit-mode'); renderAll(); } }
    </script>
</body>
</html>
